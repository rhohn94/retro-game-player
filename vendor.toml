# vendor.toml — Dependency Channel intent (Grimoire seed stub).
#
# Declares each first-party dependency this repo vendors from a published
# GitHub Release. `recipe.py sync-deps` resolves → downloads → verifies sha256
# → atomic-replaces vendor/<dep>/ → writes vendor.lock. Build & runtime read
# only the committed vendor/<dep>/ bytes; the network is touched at sync time.
#
# This stub declares NO active [deps.*] — add a [deps.<name>] block per
# release-vendored dependency. vendor.lock is auto-generated (do not hand-edit);
# commit both files plus the vendored bytes under vendor/<dep>/.

schema_version = 1

# ─────────────────────────────────────────────────────────────────────────────
# Aura (rhohn94/design-language) — vendored from the stable release channel.
#
# History: Aura was previously consumed as a git submodule at vendor/aura
# (pinned to 83c50b3f, the v3.20-era source tree) because the v3.20 release
# ASSET omitted `bindings/react` (upstream gap design-language#858) — the very
# tree Harmony imports via @aura/react. dl#858 is now CLOSED: the v3.541.0
# asset bundle ships bindings/react, so the planned channel migration (the
# documented W19 reconciliation; see
# docs/design/dependency-channel-conformance.md) is complete. The submodule +
# .gitmodules entry were removed; vendor/aura is now channel-vendored bytes at
# the SAME path, so the @aura/react / @aura/css / @aura/runtime aliases in
# vite.config.ts resolve unchanged.

[deps.aura]
repo = "rhohn94/design-language"   # GitHub owner/repo of the producer
channel = "stable"                 # stable | beta (the producer's release channel)
version = "3.554.0"
artifact = "aura-v3.554.0.tar.gz"
dest = "vendor/aura"               # repo-relative vendored destination
kind = "asset-bundle"              # asset-bundle | vendored-crate | app-binary
strip_components = 1               # tarball prefixes an aura-v3.541.0/ component

