<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Harmony — In-page play</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      /* EmulatorJS mounts its UI into #game and fills it. */
      #game {
        width: 100%;
        height: 100%;
      }
      /* A faint diagnostic, shown until EmulatorJS paints over the frame — also
         stays visible if a core fails to load, so the running origin and core
         are verifiable in the real app. */
      #diag {
        position: absolute;
        left: 8px;
        bottom: 6px;
        z-index: 2;
        font: 11px -apple-system, system-ui, sans-serif;
        color: #5f5;
        opacity: 0.55;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="diag"></div>
    <script>
      // --- Audio cold-start handling (W276): warm-then-reset master-gain shim.
      // A FRESH AudioContext PRODUCES ~2–3 s of garbled samples while the JIT
      // warms, the core finishes init, and RetroArch's resampler converges. A
      // bigger buffer does not help (the samples themselves are wrong). But an
      // in-emulator RESET on an already-warm context is clean. So we
      // WARM-THEN-RESET — hold audio muted (and the frame covered) while the
      // emulator boots once to pay the cold-start cost, then reset it and
      // reveal: the boot you see + hear replays from power-on on a now-warm
      // pipeline, so it is clean AND the boot screen / jingle is preserved.
      // The boot orchestration (next script) calls window.__harmonyRevealAudio()
      // after the reset. This shim just routes all audio through a master gain
      // held at 0 until that reveal. Every wrapper is defensive: any failure
      // leaves native audio untouched.
      (function () {
        var Native = window.AudioContext || window.webkitAudioContext;
        if (!Native) return;
        var RAMP_S = 0.25; // brief ramp on reveal, to avoid a click
        var origConnect = AudioNode.prototype.connect;
        var origDisconnect = AudioNode.prototype.disconnect;
        var masters = [];
        var revealed = false;

        function attachMaster(ctx) {
          try {
            var master = ctx.createGain();
            // Muted until the warm-then-reset reveal; contexts created AFTER the
            // reveal start audible.
            master.gain.value = revealed ? 1 : 0;
            origConnect.call(master, ctx.destination); // original connect, not rerouted
            ctx.__harmonyMaster = master;
            masters.push(master);
          } catch (e) {
            /* leave audio untouched if anything is unexpected */
          }
        }

        // Called by the boot orchestration once the post-reset (warm) boot is
        // running, to fade every master gain up to full.
        window.__harmonyRevealAudio = function () {
          revealed = true;
          for (var i = 0; i < masters.length; i++) {
            try {
              var g = masters[i].gain;
              var t = masters[i].context.currentTime;
              g.cancelScheduledValues(t);
              g.setValueAtTime(Math.max(g.value, 0.0001), t);
              g.exponentialRampToValueAtTime(1, t + RAMP_S);
              g.setValueAtTime(1, t + RAMP_S);
            } catch (e) {
              try {
                masters[i].gain.value = 1;
              } catch (e2) {}
            }
          }
        };

        AudioNode.prototype.connect = function (dest) {
          var ctx = this.context;
          if (ctx && ctx.__harmonyMaster && dest === ctx.destination) {
            var rest = Array.prototype.slice.call(arguments, 1);
            return origConnect.apply(this, [ctx.__harmonyMaster].concat(rest));
          }
          return origConnect.apply(this, arguments);
        };
        AudioNode.prototype.disconnect = function (dest) {
          var ctx = this.context;
          if (ctx && ctx.__harmonyMaster && dest === ctx.destination) {
            try {
              return origDisconnect.call(this, ctx.__harmonyMaster);
            } catch (e) {
              /* fall through */
            }
          }
          return origDisconnect.apply(this, arguments);
        };

        function wrap(Ctor) {
          function Patched() {
            var ctx = arguments.length ? new Ctor(arguments[0]) : new Ctor();
            attachMaster(ctx);
            return ctx;
          }
          Patched.prototype = Ctor.prototype;
          return Patched;
        }
        try {
          if (window.AudioContext) window.AudioContext = wrap(window.AudioContext);
          if (window.webkitAudioContext)
            window.webkitAudioContext = wrap(window.webkitAudioContext);
        } catch (e) {
          /* keep native audio if wrapping fails */
        }
      })();
    </script>
    <script>
      (function () {
        var q = new URLSearchParams(location.search);
        var core = q.get("core") || "nes";
        var game = q.get("game") || "";
        var name = q.get("name") || "Game";
        // v0.37 W376: the TV hover-attract preview mounts this same page for
        // the EJS path — a no-trace spectator session (tv-mode-design.md
        // §v0.27 → W273, extended §v0.37 → W376). `preview=1` gates every
        // disk-touching operation in the save bridge below to a same-shaped
        // no-op: no SRAM restore-on-boot read, no periodic/pagehide SRAM
        // flush, and any save-state/load-state request answers with an error
        // instead of touching `/saves/...` at all. Purity holds even if a
        // future caller somehow reaches the bridge in preview mode — the gate
        // lives in the bridge itself, not just in what InPagePlayer.tsx sends.
        var preview = q.get("preview") === "1";
        document.getElementById("diag").textContent =
          "origin " + location.origin + " · core " + core + (preview ? " · preview" : "");

        // Load the single minified production bundle (emulator.min.js, built
        // locally from src/ via scripts/build-ejs-bundle.mjs). This is the fast
        // path: one request instead of loader.js's debug path, which loads
        // ~580 KB of src/ scripts sequentially one-at-a-time.
        window.EJS_player = "#game";
        window.EJS_core = core;
        window.EJS_pathtodata = "/emulatorjs/";
        // Use the bundled WebGL2 core (e.g. fceumm-wasm.data). EmulatorJS otherwise
        // defaults NES to the *legacy* core (fceumm-legacy-wasm.data), which we
        // don't bundle — it would be fetched from the public CDN on every boot
        // (slow, and breaks offline play). WKWebView supports WebGL2, so the
        // non-legacy core renders fine and loads instantly from the loopback origin.
        // rewindEnabled turns on the retroarch-side frame history that the
        // overlay's "Rewind 5 s" action (W243) drives via toggle_rewind.
        window.EJS_defaultOptions = { webgl2Enabled: "enabled", rewindEnabled: "enabled" };
        // notWithPath=true for the game download (emulator.js), so this relative
        // URL resolves directly against this same loopback origin.
        window.EJS_gameUrl = "/rom/" + game;
        window.EJS_gameName = name;
        window.EJS_startOnLoaded = true;

        // --- Two-player gamepad config (v0.35 W353; in-page-play-design.md §7) ---
        // EmulatorJS auto-assigns the first two connected gamepads to player
        // slots 0/1 in controller-connect order (its GamepadHandler "connected"
        // listener fills the first empty `gamepadSelection` slot — no config
        // needed for that part). What it does NOT ship is a default *button*
        // mapping for any player beyond 0: `defaultControllers[1..3]` are empty
        // objects in the vendored runtime, so a slot-1 pad is "selected" but
        // every button press is silently dropped (`this.controls[1][j]` has no
        // `value2` for gamepadEvent to match). EJS_defaultControls is the
        // documented override point — it seeds `this.controls` directly and
        // REPLACES the built-in default wholesale (emulator.js only assigns it
        // when truthy, but does not merge it), so player 0's entry below also
        // repeats EmulatorJS's own built-in keyboard `value` mapping — omitting
        // it would silently break keyboard play for player 0 the moment this
        // config is present. Player 1 gets gamepad-only entries (no keyboard
        // `value`): a second physical pad is the only supported player-2 input
        // this release, keyboard-as-player-2 is out of scope.
        function padButton(value2, value) {
          var entry = { value2: value2 };
          if (value !== undefined) entry.value = value;
          return entry;
        }
        // [gamepadLabel, player-0 keyboard key] pairs, in standard-mapping
        // button-index order — matches both EmulatorJS's built-in player-0
        // default and the Gamepad API's canonical button layout: A/B/X/Y,
        // select/start, shoulders, sticks, d-pad. NES/SNES only ever read
        // buttons 0–13, so shoulders are included but sticks are not needed.
        var STANDARD_PAD_BUTTONS = [
          ["BUTTON_2", "x"],
          ["BUTTON_4", "s"],
          ["SELECT", "v"],
          ["START", "enter"],
          ["DPAD_UP", "up arrow"],
          ["DPAD_DOWN", "down arrow"],
          ["DPAD_LEFT", "left arrow"],
          ["DPAD_RIGHT", "right arrow"],
          ["BUTTON_1", "z"],
          ["BUTTON_3", "a"],
          ["LEFT_TOP_SHOULDER", "q"],
          ["RIGHT_TOP_SHOULDER", "e"],
          ["LEFT_BOTTOM_SHOULDER", "tab"],
          ["RIGHT_BOTTOM_SHOULDER", "r"],
        ];
        function playerControls(includeKeyboard) {
          var out = {};
          for (var i = 0; i < STANDARD_PAD_BUTTONS.length; i++) {
            var pair = STANDARD_PAD_BUTTONS[i];
            out[i] = padButton(pair[0], includeKeyboard ? pair[1] : undefined);
          }
          return out;
        }
        window.EJS_defaultControls = {
          0: playerControls(true),
          1: playerControls(false),
        };

        var s = document.createElement("script");
        s.src = "/emulatorjs/loader.js";
        document.body.appendChild(s);

        // W276: the parent's pause/resume (v0.15 overlay, W243 pause-on-blur)
        // is tracked here so the warm-then-reset block below can defer its
        // reset while paused — the reveal must never present a paused,
        // still-garbled frame. Set/cleared in the message bridge further down.
        var paused = false;
        var onWarmResume = null; // deferred warm reset, run on the next resume

        // Warm-then-reset boot (W276; see the audio shim above): keep the frame
        // covered and audio muted while the emulator boots once to warm the JIT
        // + resampler, then RESET it and reveal — so the boot the user sees and
        // hears replays clean from power-on. Tuning: WARMUP_MS = the mute+cover
        // window; it must be ≥ how long the garble lasts on a cold boot.
        (function () {
          var WARMUP_MS = 3000; // ≥ cold-start garble duration
          var MAX_WAIT_MS = 25000; // safety net: never stay muted/covered forever
          var done = false;
          var warmStarted = false;

          // Cover the frame so the first (silent) warm boot isn't seen; the
          // reset's clean boot is what the user actually watches. The id is the
          // DOM marker the runtime smoke inspect can look for.
          var cover = document.createElement("div");
          cover.id = "warmup-cover";
          cover.setAttribute(
            "style",
            "position:absolute;inset:0;background:#000;z-index:3;display:flex;" +
              "align-items:center;justify-content:center;color:#888;" +
              "font:12px -apple-system,system-ui,sans-serif;"
          );
          cover.textContent = "Warming up…";
          document.body.appendChild(cover);

          function reveal() {
            if (done) return;
            done = true;
            try {
              if (window.__harmonyRevealAudio) window.__harmonyRevealAudio();
            } catch (e) {}
            if (cover.parentNode) {
              cover.style.transition = "opacity .25s";
              cover.style.opacity = "0";
              setTimeout(function () {
                if (cover.parentNode) cover.parentNode.removeChild(cover);
              }, 300);
            }
          }

          function resetAndReveal() {
            if (done) return; // the MAX_WAIT_MS net already revealed — never reset a live game
            var em = window.EJS_emulator;
            try {
              if (em && em.gameManager && typeof em.gameManager.restart === "function") {
                em.gameManager.restart();
              } else if (em && typeof em.restart === "function") {
                em.restart();
              }
            } catch (e) {
              /* if the reset fails, reveal what we have rather than stay muted */
            }
            reveal();
          }

          function startWarmup() {
            if (warmStarted) return;
            warmStarted = true;
            setTimeout(function () {
              if (paused) {
                // Paused mid-warm: defer until the parent resumes (the
                // MAX_WAIT_MS reveal still applies unconditionally).
                onWarmResume = resetAndReveal;
                return;
              }
              resetAndReveal();
            }, WARMUP_MS);
          }

          // EJS_emulator appears once the runtime instantiates (before it
          // starts running). Prefer the one-shot "start" event; if that API
          // isn't present, fall back to timing the warmup from when the
          // instance appears.
          var poll = setInterval(function () {
            var em = window.EJS_emulator;
            if (!em) return;
            clearInterval(poll);
            if (typeof em.on === "function") {
              var fired = false;
              em.on("start", function () {
                if (fired) return; // ignore the post-reset "start"
                fired = true;
                startWarmup();
              });
            } else {
              startWarmup();
            }
          }, 100);

          setTimeout(reveal, MAX_WAIT_MS);
        })();

        // --- Performance sampling (v0.29 W281; performance-tooling-design.md) ---
        // EmulatorJS's public JS API (EJS_emulator) does not expose a reported
        // frame rate — checked directly against the vendored build before writing
        // this rather than assumed, per the design doc's instruction. Instead a
        // small rAF loop samples the emulator's own visible <canvas> paint
        // cadence (the same canvas EJS_emulator.canvas / .gameManager draws into),
        // which is the best available proxy for "how often is this game actually
        // presenting a new frame" without patching the vendored runtime. Reports
        // fps + mean frame time every REPORT_INTERVAL_MS via postMessage so the
        // parent (InPagePlayer.tsx) can show the on-screen counter and forward a
        // coarser copy into the sibling perf log (report_ejs_perf_stats IPC).
        (function () {
          var REPORT_INTERVAL_MS = 1000; // coarser than the native path's 10s window is fine
          var windowStart = null;
          var frameCount = 0;
          var raf = null;

          function sampleLoop(now) {
            raf = requestAnimationFrame(sampleLoop);
            if (windowStart === null) {
              windowStart = now;
              frameCount = 0;
              return;
            }
            frameCount++;
            var elapsed = now - windowStart;
            if (elapsed < REPORT_INTERVAL_MS) return;
            var fps = (frameCount * 1000) / elapsed;
            var frameTimeMs = elapsed / frameCount;
            windowStart = now;
            frameCount = 0;
            try {
              window.parent.postMessage(
                { type: "harmony-perf-stats", fps: fps, frameTimeMs: frameTimeMs },
                "*"
              );
            } catch (e) {
              /* best-effort — a missed report is not a session error */
            }
          }

          raf = requestAnimationFrame(sampleLoop);
          window.addEventListener("pagehide", function () {
            if (raf !== null) cancelAnimationFrame(raf);
          });
        })();

        // Bridge for the Harmony in-game overlay (v0.15). The parent asks us to
        // pause/resume the emulator while its overlay is open (so the gamepad
        // doesn't drive the game behind the menu); we forward the in-iframe
        // Escape key up so the parent can open the overlay even while the game
        // holds keyboard focus.
        // Volume asked for before the emulator exists is held here and
        // applied on the "start" event (W243).
        var pendingVolume = null;
        function applyVolume(v) {
          if (typeof v !== "number" || !isFinite(v)) return;
          v = Math.min(1, Math.max(0, v));
          if (window.EJS_emulator && typeof EJS_emulator.setVolume === "function") {
            EJS_emulator.volume = v;
            EJS_emulator.setVolume(v);
          } else {
            pendingVolume = v;
          }
        }

        window.addEventListener("message", function (e) {
          var t = e.data && e.data.type;
          if (!t) return;
          if (t === "harmony-volume") {
            applyVolume(e.data.value);
            return;
          }
          if (!window.EJS_emulator) return;
          if (t === "harmony-pause" && typeof EJS_emulator.pause === "function") {
            paused = true; // W276: the warm-then-reset block defers on this
            EJS_emulator.pause();
          } else if (t === "harmony-resume" && typeof EJS_emulator.play === "function") {
            paused = false;
            EJS_emulator.play();
            // W276: run a warm reset that was deferred while paused.
            if (onWarmResume) {
              var deferred = onWarmResume;
              onWarmResume = null;
              deferred();
            }
          } else if (t === "harmony-fastforward" && gm()) {
            // W243: EmulatorJS's built-in fast-forward, toggled from the
            // Harmony overlay.
            gm().toggleFastForward(e.data.active ? 1 : 0);
          } else if (t === "harmony-rewind" && gm() && gm().functions) {
            // W243: run the retroarch rewind for N seconds, then resume
            // normal play. Requires rewindEnabled (set above).
            var seconds = Math.min(30, Math.max(1, Number(e.data.seconds) || 5));
            try {
              gm().functions.toggleRewind(1);
              setTimeout(function () {
                try { gm().functions.toggleRewind(0); } catch (err) { /* best-effort */ }
              }, seconds * 1000);
            } catch (err) { /* best-effort — rewind unsupported by this core */ }
          }
        });
        window.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            e.preventDefault();
            window.parent.postMessage({ type: "harmony-overlay-toggle" }, "*");
          }
        });

        // --- Save bridge (v0.23 W231; save-persistence-design.md §3) ---
        // Battery SRAM and save states persist through the loopback server's
        // /saves/<id>/* routes into the same on-disk layout the native path
        // uses. Everything here is best-effort: any failure logs and play
        // continues — the bridge must never block the game.
        //
        // v0.37 W376: every function below is a no-op (or answers an honest
        // error) when `preview` is set — restoreSram never reads, flushSram
        // never writes, and the save-state handlers never touch `/saves/...`
        // at all. This is the frontend half of the byte-identical-saves
        // purity guarantee InPagePlayer.tsx's `?preview=1` flag asks for;
        // gating it here (not just in the parent) means the guarantee holds
        // even if a future caller reaches this bridge without checking first.
        var SRAM_FLUSH_MS = 30000;
        var lastSramB64 = null;

        function gm() {
          return window.EJS_emulator && EJS_emulator.gameManager;
        }

        function toB64(bytes) {
          // Chunked so a large region can't overflow the argument list.
          var s = "";
          for (var i = 0; i < bytes.length; i += 0x8000) {
            s += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
          }
          return btoa(s);
        }

        function bytesEqualB64(bytes) {
          // Compare via base64 to avoid keeping a second big buffer around.
          var b64 = toB64(bytes);
          if (b64 === lastSramB64) return true;
          lastSramB64 = b64;
          return false;
        }

        function postBytes(path, bytes) {
          return fetch(path, { method: "POST", body: bytes }).then(function (r) {
            if (!r.ok) throw new Error(path + " -> " + r.status);
          });
        }

        function flushSram() {
          if (preview) return; // W376 purity: a preview never writes SRAM
          try {
            var m = gm();
            if (!m) return;
            var data = m.getSaveFile(); // triggers saveSaveFiles() internally
            if (!data || !data.length) return;
            if (bytesEqualB64(data)) return;
            postBytes("/saves/" + game + "/sram", data).catch(function (e) {
              console.warn("harmony save bridge: SRAM flush failed", e);
            });
          } catch (e) {
            console.warn("harmony save bridge: SRAM read failed", e);
          }
        }

        function restoreSram() {
          if (preview) return; // W376 purity: a preview never reads a real save
          fetch("/saves/" + game + "/sram").then(function (r) {
            if (!r.ok) return; // nothing saved yet — fresh session
            return r.arrayBuffer().then(function (buf) {
              var m = gm();
              if (!m) return;
              var bytes = new Uint8Array(buf);
              m.FS.writeFile(m.getSaveFilePath(), bytes);
              m.loadSaveFiles();
              bytesEqualB64(bytes); // seed the dirty check
            });
          }).catch(function () { /* fresh session */ });
        }

        // W232's overlay drives states via postMessage; each request answers
        // with harmony-save-result so the overlay can confirm or show why not.
        function answer(op, slot, error) {
          window.parent.postMessage(
            { type: "harmony-save-result", op: op, slot: slot, error: error || null },
            "*"
          );
        }

        window.addEventListener("message", function (e) {
          var d = e.data || {};
          var m = gm();
          if (!m) return;
          if (d.type === "harmony-save-state") {
            // W376 purity: a preview session never writes a save-state file —
            // answer honestly instead of silently dropping the request.
            if (preview) { answer("save", d.slot, "saves are disabled during preview"); return; }
            try {
              var state = m.getState();
              postBytes("/saves/" + game + "/state/" + d.slot, state)
                .then(function () { answer("save", d.slot); })
                .catch(function (err) { answer("save", d.slot, String(err)); });
            } catch (err) {
              answer("save", d.slot, String(err));
            }
          } else if (d.type === "harmony-load-state") {
            if (preview) { answer("load", d.slot, "saves are disabled during preview"); return; }
            fetch("/saves/" + game + "/state/" + d.slot)
              .then(function (r) {
                if (!r.ok) throw new Error("no save in slot " + d.slot);
                return r.arrayBuffer();
              })
              .then(function (buf) {
                m.loadState(new Uint8Array(buf));
                answer("load", d.slot);
              })
              .catch(function (err) { answer("load", d.slot, String(err)); });
          }
        });

        // Wire the lifecycle once the emulator exists: restore on start,
        // flush periodically and when the page is torn down (iframe unmount).
        // (restoreSram/flushSram are themselves preview no-ops, above — the
        // interval is still harmless to install, but skipping it entirely
        // for a preview avoids a pointless recurring no-op timer.)
        var wireTimer = setInterval(function () {
          if (!window.EJS_emulator || typeof EJS_emulator.on !== "function") return;
          clearInterval(wireTimer);
          var wired = false;
          EJS_emulator.on("start", function () {
            // W276: the warm-then-reset boot may re-fire "start" after the
            // reset — restore + flush interval + pending volume run once.
            if (wired) return;
            wired = true;
            restoreSram();
            if (!preview) setInterval(flushSram, SRAM_FLUSH_MS);
            // W243: apply a volume that arrived before the emulator existed.
            if (pendingVolume !== null) {
              var v = pendingVolume;
              pendingVolume = null;
              applyVolume(v);
            }
          });
        }, 250);
        window.addEventListener("pagehide", flushSram);
      })();
    </script>
  </body>
</html>
