<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Harmony — In-page play</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      /* EmulatorJS mounts its UI into #game and fills it. */
      #game {
        width: 100%;
        height: 100%;
      }
      /* A faint diagnostic, shown until EmulatorJS paints over the frame — also
         stays visible if a core fails to load, so the running origin and core
         are verifiable in the real app. */
      #diag {
        position: absolute;
        left: 8px;
        bottom: 6px;
        z-index: 2;
        font: 11px -apple-system, system-ui, sans-serif;
        color: #5f5;
        opacity: 0.55;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="diag"></div>
    <script>
      (function () {
        var q = new URLSearchParams(location.search);
        var core = q.get("core") || "nes";
        var game = q.get("game") || "";
        var name = q.get("name") || "Game";
        document.getElementById("diag").textContent =
          "origin " + location.origin + " · core " + core;

        // Load the single minified production bundle (emulator.min.js, built
        // locally from src/ via scripts/build-ejs-bundle.mjs). This is the fast
        // path: one request instead of loader.js's debug path, which loads
        // ~580 KB of src/ scripts sequentially one-at-a-time.
        window.EJS_player = "#game";
        window.EJS_core = core;
        window.EJS_pathtodata = "/emulatorjs/";
        // Use the bundled WebGL2 core (e.g. fceumm-wasm.data). EmulatorJS otherwise
        // defaults NES to the *legacy* core (fceumm-legacy-wasm.data), which we
        // don't bundle — it would be fetched from the public CDN on every boot
        // (slow, and breaks offline play). WKWebView supports WebGL2, so the
        // non-legacy core renders fine and loads instantly from the loopback origin.
        window.EJS_defaultOptions = { webgl2Enabled: "enabled" };
        // notWithPath=true for the game download (emulator.js), so this relative
        // URL resolves directly against this same loopback origin.
        window.EJS_gameUrl = "/rom/" + game;
        window.EJS_gameName = name;
        window.EJS_startOnLoaded = true;

        var s = document.createElement("script");
        s.src = "/emulatorjs/loader.js";
        document.body.appendChild(s);

        // Bridge for the Harmony in-game overlay (v0.15). The parent asks us to
        // pause/resume the emulator while its overlay is open (so the gamepad
        // doesn't drive the game behind the menu); we forward the in-iframe
        // Escape key up so the parent can open the overlay even while the game
        // holds keyboard focus.
        window.addEventListener("message", function (e) {
          var t = e.data && e.data.type;
          if (!t || !window.EJS_emulator) return;
          if (t === "harmony-pause" && typeof EJS_emulator.pause === "function") {
            EJS_emulator.pause();
          } else if (t === "harmony-resume" && typeof EJS_emulator.play === "function") {
            EJS_emulator.play();
          }
        });
        window.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            e.preventDefault();
            window.parent.postMessage({ type: "harmony-overlay-toggle" }, "*");
          }
        });

        // --- Save bridge (v0.23 W231; save-persistence-design.md §3) ---
        // Battery SRAM and save states persist through the loopback server's
        // /saves/<id>/* routes into the same on-disk layout the native path
        // uses. Everything here is best-effort: any failure logs and play
        // continues — the bridge must never block the game.
        var SRAM_FLUSH_MS = 30000;
        var lastSramB64 = null;

        function gm() {
          return window.EJS_emulator && EJS_emulator.gameManager;
        }

        function toB64(bytes) {
          // Chunked so a large region can't overflow the argument list.
          var s = "";
          for (var i = 0; i < bytes.length; i += 0x8000) {
            s += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
          }
          return btoa(s);
        }

        function bytesEqualB64(bytes) {
          // Compare via base64 to avoid keeping a second big buffer around.
          var b64 = toB64(bytes);
          if (b64 === lastSramB64) return true;
          lastSramB64 = b64;
          return false;
        }

        function postBytes(path, bytes) {
          return fetch(path, { method: "POST", body: bytes }).then(function (r) {
            if (!r.ok) throw new Error(path + " -> " + r.status);
          });
        }

        function flushSram() {
          try {
            var m = gm();
            if (!m) return;
            var data = m.getSaveFile(); // triggers saveSaveFiles() internally
            if (!data || !data.length) return;
            if (bytesEqualB64(data)) return;
            postBytes("/saves/" + game + "/sram", data).catch(function (e) {
              console.warn("harmony save bridge: SRAM flush failed", e);
            });
          } catch (e) {
            console.warn("harmony save bridge: SRAM read failed", e);
          }
        }

        function restoreSram() {
          fetch("/saves/" + game + "/sram").then(function (r) {
            if (!r.ok) return; // nothing saved yet — fresh session
            return r.arrayBuffer().then(function (buf) {
              var m = gm();
              if (!m) return;
              var bytes = new Uint8Array(buf);
              m.FS.writeFile(m.getSaveFilePath(), bytes);
              m.loadSaveFiles();
              bytesEqualB64(bytes); // seed the dirty check
            });
          }).catch(function () { /* fresh session */ });
        }

        // W232's overlay drives states via postMessage; each request answers
        // with harmony-save-result so the overlay can confirm or show why not.
        function answer(op, slot, error) {
          window.parent.postMessage(
            { type: "harmony-save-result", op: op, slot: slot, error: error || null },
            "*"
          );
        }

        window.addEventListener("message", function (e) {
          var d = e.data || {};
          var m = gm();
          if (!m) return;
          if (d.type === "harmony-save-state") {
            try {
              var state = m.getState();
              postBytes("/saves/" + game + "/state/" + d.slot, state)
                .then(function () { answer("save", d.slot); })
                .catch(function (err) { answer("save", d.slot, String(err)); });
            } catch (err) {
              answer("save", d.slot, String(err));
            }
          } else if (d.type === "harmony-load-state") {
            fetch("/saves/" + game + "/state/" + d.slot)
              .then(function (r) {
                if (!r.ok) throw new Error("no save in slot " + d.slot);
                return r.arrayBuffer();
              })
              .then(function (buf) {
                m.loadState(new Uint8Array(buf));
                answer("load", d.slot);
              })
              .catch(function (err) { answer("load", d.slot, String(err)); });
          }
        });

        // Wire the lifecycle once the emulator exists: restore on start,
        // flush periodically and when the page is torn down (iframe unmount).
        var wireTimer = setInterval(function () {
          if (!window.EJS_emulator || typeof EJS_emulator.on !== "function") return;
          clearInterval(wireTimer);
          EJS_emulator.on("start", function () {
            restoreSram();
            setInterval(flushSram, SRAM_FLUSH_MS);
          });
        }, 250);
        window.addEventListener("pagehide", flushSram);
      })();
    </script>
  </body>
</html>
