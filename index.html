<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Game Player</title>
    <!-- Anti-FOUC (design-language.md §4): synchronous, runs before any CSS/JS
         bundle so the theme class is on <html> before first paint. Reads only
         localStorage; dark default is the catch-all. Keep in sync with the key
         in src/theme/tokens.ts (THEME_STORAGE_KEY) + the default theme.
         W269 rename: one-time fallback reads the legacy "harmony.theme" key
         (and its "theme-harmony-*" class values) if the new "rgp.theme" key
         has never been written, so an upgrading user's chosen theme survives
         (AuraProvider persists the migrated value under the new key on mount). -->
    <script>
      (function () {
        var LEGACY_KEY = "harmony.theme";
        var CLASS_MAP = { "theme-harmony-noir": "theme-rgp-noir", "theme-harmony-dusk": "theme-rgp-dusk" };
        try {
          var stored = localStorage.getItem("rgp.theme");
          if (!stored) {
            var legacy = localStorage.getItem(LEGACY_KEY);
            stored = (legacy && CLASS_MAP[legacy]) || null;
          }
          var t = stored || "theme-rgp-noir";
          document.documentElement.classList.add(t);
          document.documentElement.style.colorScheme =
            t === "theme-rgp-dusk" ? "light" : "dark";
        } catch (e) {
          document.documentElement.classList.add("theme-rgp-noir");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
